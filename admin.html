<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
    <div class="container">
        <h1>Trang quản lý admin</h1>
        <div class="header">
            <h1>Quản lý sản phẩm</h1>
            <button id="logout-btn">Đăng xuất</button>
        </div>
        
        <button id="add-form-btn" class="btn-add">Thêm sản phẩm mới</button>
        
        <div id="add-product-form" class="add-product-form">
            <form id="product-form">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label>Giá</label>
                    <input type="number" id="product-price" required>
                </div>
                <div class="form-group">
                    <label>URL hình ảnh</label>
                    <input type="text" id="product-image" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">Thêm sản phẩm</button>
                </div>
            </form>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-compat.js"></script>
    <script src="./js/configFirebase.js"></script>
    <script src="./js/admin.js"></script>

</body>

</html>
